<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bobivolve</title>
    <!-- Fonts loaded via preconnect + non-blocking link rather than CSS
         @import. CSS @import blocks rendering until the import resolves;
         a separate <link> with the font CSS lets the page render with
         system fallbacks while the web fonts download in the background. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400..600;1,400..600&family=Inter+Tight:wght@400..600&family=JetBrains+Mono:wght@400..600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
