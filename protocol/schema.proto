// Bobivolve sim/UI seam contract.
//
// Single source of truth for what crosses the simulation boundary — see
// ARCHITECTURE.md ("The seam contract", "Protocol and IDL"). Proto3 is the
// IDL; the wire format is proto3 JSON (NDJSON for streams). Field numbers
// follow proto3 evolution rules: additive only, no renumbering, no semantic
// changes to existing fields. Messages reserved for later releases keep
// their field numbers reserved here so R0–R1 work cannot accidentally
// collide with them.
//
// Naming convention: snake_case in this file, camelCase on the wire (proto3
// JSON encoding). The codegen toolchain (ts-proto, prost) produces the
// language-idiomatic shape on each side.

syntax = "proto3";

package bobivolve.protocol.v1;

// ─────────────────────────────────────────────────────────────────────────────
// Command — UI → sim. Fire-and-forget; the sim acknowledges via SimEvent.
// ─────────────────────────────────────────────────────────────────────────────

message Command {
  // Caller-supplied id. The sim echoes it on CommandAck / CommandError so the
  // UI can correlate. Empty string is permitted; the UI then forfeits ack.
  string command_id = 1;

  oneof body {
    NewRun new_run = 2;
    SetSpeed set_speed = 3;
    Pause pause = 4;
    Resume resume = 5;
    Step step = 6;
    ApplyPatch apply_patch = 7;
    QueueDecree queue_decree = 8;
    Quarantine quarantine = 9;
    ConfigureAutoPause configure_auto_pause = 10;
    Save save = 11;
    Load load = 12;
    // Quarantine and ReleaseQuarantine are a symmetric verb pair, the same
    // shape as Pause / Resume. Single-purpose messages keep the discriminated
    // union readable on both sides of the seam and leave room for either
    // command to grow parameters independently (a hold-duration on
    // Quarantine, or an audit reason on ReleaseQuarantine, etc.).
    ReleaseQuarantine release_quarantine = 13;
    RevokeDecree revoke_decree = 14;
    RewindToTick rewind_to_tick = 15;
  }
}

message NewRun {
  // Single u64 seed; the sim expands it to xoshiro256** state via splitmix64.
  uint64 seed = 1;
}

message SetSpeed {
  // Allowed values: 1, 4, 16, 64. Validated at the seam.
  uint32 speed = 1;
}

message Pause {}
message Resume {}

message Step {
  // Number of sim ticks to advance while paused. Zero is treated as one.
  uint64 ticks = 1;
}

message Save {
  string slot = 1;
}

message Load {
  string slot = 1;
}

// RewindToTick — destructive scrub. The host loads the latest in-run
// snapshot at-or-before `tick`, replays any logged commands between the
// snapshot and the target, then advances the sim to land on `tick`.
// State past `tick` is forfeit; pauses on completion. The active log on
// disk is left intact (any post-`tick` entries become a stale fork) so
// future Save commands can checkpoint the rewound branch.
message RewindToTick {
  uint64 tick = 1;
}

message ConfigureAutoPause {
  // R0 ships a fixed default trigger set. Per-trigger configuration messages
  // land alongside the auto-pause UI; the message stays defined here so the
  // command field number is locked.
  repeated string enabled_triggers = 1;
}

message Quarantine {
  // Target lineage. The command is idempotent — quarantining an already-
  // quarantined lineage is a no-op and still receives a CommandAck.
  // Idempotence keeps the UI free to resend the same command without
  // bookkeeping (e.g. on transport reconnect).
  string lineage_id = 1;
}

message ReleaseQuarantine {
  // Target lineage. Idempotent: releasing a lineage that is not under
  // quarantine succeeds as a no-op and still receives a CommandAck.
  string lineage_id = 1;
}

message ApplyPatch {
  // Target lineage. Must be living (population > 0); the host replies
  // CommandError otherwise. The patched firmware overwrites the
  // lineage's reference firmware AND every extant probe in the
  // lineage. Subsequent replications drift from the patched firmware
  // via the normal mutation path — a player intervention becomes
  // part of the genetic record.
  string lineage_id = 1;
  // Full directive stack to install. Validated against
  // MIN_FIRMWARE_LENGTH. Decimal-string params per the proto3 JSON
  // convention.
  repeated DirectiveSpec firmware = 2;
}

// DirectiveSpec — wire shape for a directive carried on a Command.
// Mirrors ProbeInspectorDirective, which is the same shape carried on
// a QueryResult; the duplication is deliberate while the patch editor
// stabilises. Future cleanup may consolidate.
message DirectiveSpec {
  string kind = 1;
  map<string, string> params = 2;
}

message QueueDecree {
  // Trigger and patch are bundled into a single command — the player
  // authors them together in the decree composer.
  DecreeTriggerSpec trigger = 1;
  // Target lineage for the patch payload. Distinct from the trigger's
  // monitored lineage (e.g. "if L1 dies below 5, patch L0 to be more
  // aggressive").
  string patch_target_lineage_id = 2;
  // Patch firmware to install when the trigger fires. Same shape as
  // ApplyPatch.firmware.
  repeated DirectiveSpec patch_firmware = 3;
}

message RevokeDecree {
  // Decree id to remove from the queue. Idempotent: a decree id that
  // has already fired or been revoked is a no-op ack.
  string decree_id = 1;
}

// Trigger conditions a decree can wait on. R2 V1 ships only one shape —
// populationBelow — so the union is small. Adding shapes is additive
// proto3 and lands as the events that justify them ship.
message DecreeTriggerSpec {
  oneof body {
    PopulationBelowTriggerSpec population_below = 1;
  }
}

message PopulationBelowTriggerSpec {
  // Lineage to monitor.
  string lineage_id = 1;
  // Strict-less-than threshold. Decimal string for u64 safety.
  string threshold = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// SimEvent — sim → UI. Two delivery tiers (heartbeat vs domain events) are an
// implementation concern of the transport layer, not of the schema.
// ─────────────────────────────────────────────────────────────────────────────

message SimEvent {
  // Integer time. Floats are forbidden in tick fields (ARCHITECTURE.md).
  uint64 sim_tick = 1;

  oneof body {
    Tick tick = 2;
    Replication replication = 3;
    Speciation speciation = 4;
    Extinction extinction = 5;
    Death death = 6;
    // 7..8 reserved: R3+ FirstContact, TreatyViolation.
    PatchSaturated patch_saturated = 9;
    AutoPaused auto_paused = 10;
    CommandAck command_ack = 11;
    CommandError command_error = 12;
    // Quarantine state changes ride a symmetric verb pair that mirrors
    // the Quarantine / ReleaseQuarantine commands.
    QuarantineImposed quarantine_imposed = 13;
    QuarantineLifted quarantine_lifted = 14;
    // Player-authored patch landed on a lineage. Carries the lineage
    // id and the count of extant probes whose firmware was overwritten,
    // so the dashboard can show an immediate effect indication.
    PatchApplied patch_applied = 15;
    DecreeQueued decree_queued = 16;
    DecreeFired decree_fired = 17;
    DecreeRevoked decree_revoked = 18;
  }

  reserved 7, 8;
  reserved "first_contact", "treaty_violation";
}

message Tick {
  uint32 actual_speed = 1;
  uint64 population_total = 2;
  map<string, uint64> population_by_lineage = 3;
  // Origin compute budget at the heartbeat tick. Decimal strings for
  // u64-safety on JSON-encoded transports. Max is the cap regen targets;
  // the dashboard normalises against it. Best-effort like the rest of
  // the heartbeat — the UI should treat dropped heartbeats as "value
  // unchanged", not "value zero".
  string origin_compute = 4;
  string origin_compute_max = 5;
  // Authoritative run-loop state at the heartbeat tick. The store
  // reconciles its optimistic projection against these when no pending
  // command for the same field is in flight, so any class of message-
  // drop or projection-drift bug self-corrects on the next heartbeat.
  bool paused = 6;
  uint32 speed = 7;
}

message Replication {
  string parent_probe_id = 1;
  string child_probe_id = 2;
  string lineage_id = 3;
  bool mutated = 4;
}

message Speciation {
  string parent_lineage_id = 1;
  string new_lineage_id = 2;
  string new_lineage_name = 3;
  // The probe whose replication-with-drift triggered this speciation.
  // Stored on the lineage record as `founder_probe_id` so the dashboard
  // can render lineage origin without joining against the event log.
  string founder_probe_id = 4;
}

message Extinction {
  string lineage_id = 1;
}

message Death {
  string probe_id = 1;
  string lineage_id = 2;
}

message AutoPaused {
  // Identifier of the trigger that fired (e.g. "lineage_extinction").
  string trigger = 1;
}

message CommandAck {
  string command_id = 1;
}

message CommandError {
  string command_id = 1;
  string message = 2;
}

message QuarantineImposed {
  // Lineage now under quarantine. Emitted only when state actually
  // flips — an idempotent Quarantine command that finds the lineage
  // already suspended emits a CommandAck but no QuarantineImposed.
  string lineage_id = 1;
}

message QuarantineLifted {
  // Lineage whose quarantine was just released. Emitted only when state
  // actually flips — an idempotent ReleaseQuarantine on a lineage not
  // under quarantine emits a CommandAck but no QuarantineLifted.
  string lineage_id = 1;
}

message PatchApplied {
  // Target lineage that just received a player-authored patch.
  string lineage_id = 1;
  // Count of extant probes whose firmware was overwritten when the
  // patch landed. Decimal string for u64-safety on JSON-encoded
  // transports.
  string probes_affected = 2;
  // Stable id minted by the sim. Carried on the matching
  // PatchSaturated event so the dashboard can correlate.
  string patch_id = 3;
}

message PatchSaturated {
  // Patch whose carriers just crossed the saturation threshold (50%
  // of population). Fires once per patch — the saturation flag is
  // sticky.
  string patch_id = 1;
  // Counts at the moment of firing; decimal strings for u64 safety.
  string carrier_population = 2;
  string total_population = 3;
}

message DecreeQueued {
  // Stable id minted by the host on QueueDecree. Carried back so the
  // dashboard can correlate the player's submission with the decree
  // visible in the queue.
  string decree_id = 1;
}

message DecreeFired {
  // Decree that just fired and was removed from the queue.
  string decree_id = 1;
  // Target lineage of the decree's patch payload.
  string patch_target_lineage_id = 2;
  // True when the patch landed cleanly. False when the target lineage
  // had been extinct by the time the trigger fired — the decree is
  // still consumed (one-shot) but no firmware was written.
  bool landed = 3;
  // Probes whose firmware was overwritten. 0 when landed=false.
  string probes_affected = 4;
}

message DecreeRevoked {
  // Decree the player cancelled before it fired. Removed from the
  // queue. No payload effect.
  string decree_id = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Query / QueryResult — UI → sim → reply. Pull-only; never pushed.
// ─────────────────────────────────────────────────────────────────────────────

message Query {
  string query_id = 1;

  oneof body {
    LineageTreeQuery lineage_tree = 2;
    ProbeInspectorQuery probe_inspector = 3;
    DriftTelemetryQuery drift_telemetry = 4;
    LogSliceQuery log_slice = 5;
    PopulationSummaryQuery population_summary = 6;
    SubstrateQuery substrate = 7;
    ListSavesQuery list_saves = 8;
    DecreeQueueQuery decree_queue = 9;
  }
}

message QueryResult {
  string query_id = 1;

  oneof body {
    LineageTree lineage_tree = 2;
    ProbeInspector probe_inspector = 3;
    DriftTelemetry drift_telemetry = 4;
    LogSlice log_slice = 5;
    PopulationSummary population_summary = 6;
    Substrate substrate = 7;
    ListSaves list_saves = 8;
    DecreeQueue decree_queue = 9;
  }
}

message LineageTreeQuery {}
message DecreeQueueQuery {}
message ProbeInspectorQuery {
  string probe_id = 1;
}
message DriftTelemetryQuery {
  string lineage_id = 1;
}
message LogSliceQuery {
  uint64 from_tick = 1;
  uint64 to_tick = 2;
}
message PopulationSummaryQuery {}
message SubstrateQuery {}
message ListSavesQuery {}

// Result message bodies. Shapes evolve alongside the dashboard
// implementation.

// LineageTree — full slab of lineage state. Used by the dashboard to
// rehydrate after a Load (the snapshot carries the lineage map and
// the quarantined set, but the client clears its store on Load and
// would otherwise stay empty until events fire). Names, parentage,
// founding ticks, applied patches, and quarantine flags all live
// here so a single fetch reproduces the UI's lineage view.
message LineageTree {
  repeated LineageTreeEntry lineages = 1;
}

message LineageTreeEntry {
  string id = 1;
  string name = 2;
  // Empty string for the founding lineage, otherwise the lineage that
  // speciated to produce this one. Empty-string-as-null follows proto3
  // convention for optional strings.
  string parent_lineage_id = 3;
  string founded_at_tick = 4;
  string founder_probe_id = 5;
  repeated string patches = 6;
  bool quarantined = 7;
}

// ProbeInspector — per-probe identity and firmware. The `probe`
// field is unset (proto3 default) when the probe id was not found
// in the current state.
message ProbeInspector {
  ProbeInspectorProbe probe = 1;
}

message ProbeInspectorProbe {
  string id = 1;
  string lineage_id = 2;
  uint64 born_at_tick = 3;
  repeated ProbeInspectorDirective firmware = 4;
}

message ProbeInspectorDirective {
  string kind = 1;
  // Numeric parameters serialised as decimal strings to preserve u64
  // values across the seam (proto3 JSON convention).
  map<string, string> params = 2;
}

// DriftTelemetry — per-lineage drift statistics for the lineage
// inspector. Numeric values use decimal strings to preserve u64
// precision across the seam (proto3 JSON convention).
message DriftTelemetry {
  // Number of extant probes in this lineage at query time.
  uint64 population = 1;
  // Per-parameter drift stats, keyed by dotted path
  // (e.g. "replicate.threshold") so a richer firmware's parameters
  // cannot collide.
  map<string, ParameterDrift> parameters = 2;
  // Speciation rule, exposed to the seam so the UI can render the
  // boundary alongside live drift. A child speciates from its lineage
  // when |child - reference| > reference / divergence_divisor for any
  // parameter; equivalently, the relative speciation threshold is
  // 1 / divergence_divisor (e.g. divisor 100 → ±1%).
  string divergence_divisor = 3;
  // Current reference firmware in directive order. The patch editor
  // starts from this so the player edits the lineage's actual current
  // shape, not a derived view that has lost ordering. Same wire shape
  // as the firmware carried on ApplyPatch — the editor round-trips
  // the result of this query into a patch command on submit.
  repeated DirectiveSpec reference_firmware = 4;
  // Patch ids that have landed on this lineage or were inherited from
  // a parent lineage at speciation. The dashboard renders these as the
  // lineage's intervention history.
  repeated string patches = 5;
}

message ParameterDrift {
  // Founder firmware value at lineage birth — frozen.
  string reference = 1;
  // Live span across extant probes in this lineage.
  string min = 2;
  string max = 3;
  // Integer mean, floor(sum / count).
  string mean = 4;
}

message LogSlice {}
message PopulationSummary {}

// ListSaves — index of named save slots written by the host. The
// dashboard renders this in the Run panel so a player can browse and
// click to load.
message ListSaves {
  repeated SaveSummary saves = 1;
}

message SaveSummary {
  string slot = 1;
  // Tick at which the save was taken; decimal string (proto3 JSON
  // convention for u64 over JSON-encoded transports).
  string tick = 2;
  // Wall-clock millis since epoch when the save was written. Number
  // values fit comfortably in a JS double; uint64 here so the proto
  // encoding does not lose precision on far-future timestamps.
  uint64 saved_at_ms = 3;
}

// Substrate — current spatial state of the simulation. Carries the
// per-cell resource grid and the position of every extant probe so
// the UI can render a heatmap with probe overlays. Numeric u64 values
// are decimal strings (proto3 JSON convention).
message Substrate {
  // Side of the (square) sub-lattice. Cells are flat row-major:
  // cells[y * side + x].
  uint32 side = 1;
  // Per-cell resource counts; length is side * side.
  repeated string cells = 2;
  // Cap that resource regen targets. The UI normalises heatmap
  // brightness against this without having to know the sim's tuning.
  string max_resource_per_cell = 3;
  // Position + lineage of every extant probe at query time.
  repeated SubstrateProbe probes = 4;
}

message SubstrateProbe {
  string id = 1;
  string lineage_id = 2;
  uint32 x = 3;
  uint32 y = 4;
}

// DecreeQueue — queued decrees in declaration order. Each summary is
// flat enough for the dashboard to render without joining other state.
message DecreeQueue {
  repeated DecreeQueueEntry decrees = 1;
}

message DecreeQueueEntry {
  string id = 1;
  // Tick at which the decree was queued.
  string queued_at_tick = 2;
  // Trigger spec, with one shape per known trigger kind.
  DecreeTriggerSpec trigger = 3;
  // Patch payload's target lineage.
  string patch_target_lineage_id = 4;
  // Patch firmware so the dashboard can show what the decree will do.
  repeated DirectiveSpec patch_firmware = 5;
}
